name: docker publish

on:
  push:
    tags: [ 'v*.*.*' ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # Required for cosign OIDC keyless signing
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log into GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # ── Keyless image signing via Sigstore/cosign ──────────────────────────
      # Signs the pushed image with a short-lived OIDC certificate tied to this
      # workflow's identity.  Anyone can verify with:
      #   cosign verify \
      #     --certificate-identity-regexp "https://github.com/${{ github.repository }}" \
      #     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
      #     ghcr.io/${{ github.repository }}:<tag>
      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign the published image
        run: |
          cosign sign --yes \
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

