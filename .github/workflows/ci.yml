name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dev tools
        run: pip install ruff pytest

      # ── Formatting ────────────────────────────────────────────────────────
      - name: Check formatting (ruff format)
        run: ruff format --check .

      # ── Linting ───────────────────────────────────────────────────────────
      - name: Lint (ruff check)
        run: ruff check .

      # ── Unit tests (no GPU required) ──────────────────────────────────────
      - name: Run unit tests
        run: pytest tests/test_unit.py -v

  # ── Container security scan ─────────────────────────────────────────────────
  # Builds the image from the PR's Dockerfile and fails if any HIGH or CRITICAL
  # CVE is found.  This catches malicious or vulnerable base image changes
  # before they are merged.
  security-scan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build image (local, no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: scan-target:ci

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Run Trivy vulnerability scan
        run: |
          trivy image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 1 \
            scan-target:ci

