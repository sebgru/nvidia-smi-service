[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B"]
ignore = [
    "B904",  # raise-without-from-inside-except (intentional in error handlers)
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_unit.py", "test_docs.py"]

[tool.coverage.run]
omit = ["tests/*"]
branch = true

[tool.coverage.report]
fail_under = 80
show_missing = true
